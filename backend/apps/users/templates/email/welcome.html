<!-- id="email_html_template" -->
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
</head>
<body style="margin:0; padding:0; background:#f1f5f9; font-family:Poppins, Arial;">

  <table width="100%" cellpadding="0" cellspacing="0">
    <tr>
      <td align="center">

        <!-- CARD -->
        <table width="500" cellpadding="0" cellspacing="0" style="background:#ffffff; border-radius:12px; margin-top:40px; padding:30px; box-shadow:0 10px 30px rgba(0,0,0,0.05);">

          <!-- HEADER -->
          <tr>
            <td align="center" style="padding-bottom:20px;">
              <h2 style="margin:0; color:#0f172a;">Bienvenue sur StaffHub</h2>
            </td>
          </tr>

          <!-- TEXT -->
          <tr>
            <td style="color:#334155; font-size:14px;">
              Bonjour <b>{{ prenom }}</b>,<br><br>

              Votre compte a été créé avec succès.<br><br>

              Voici vos informations de connexion :
            </td>
          </tr>

          <!-- CREDENTIALS -->
          <tr>
            <td style="padding:15px; margin-top:10px; background:#f8fafc; border-radius:8px; font-size:14px;">
              <b>Identifiant :</b> {{ username }}<br>
              <b>Mot de passe :</b> {{ password }}<br>
              <b>Email :</b> {{ email }}
            </td>
          </tr>

          <!-- BUTTON -->
          <tr>
            <td align="center" style="padding:25px 0;">
              <a href="http://localhost:3000/login"
                 style="background:#22c55e; color:white; padding:12px 25px; border-radius:8px; text-decoration:none; font-weight:600;">
                Se connecter
              </a>
            </td>
          </tr>

          <!-- FOOTER -->
          <tr>
            <td style="font-size:12px; color:#64748b; text-align:center;">
              Merci d'utiliser StaffHub
            </td>
          </tr>

        </table>

      </td>
    </tr>
  </table>

</body>
</html>
